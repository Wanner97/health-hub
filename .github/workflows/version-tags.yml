name: Create version tag

on:
  push:
    branches:
      - main
    paths:
      - versions.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read suite version from manifest
        id: manifest
        shell: bash
        run: |
          SUITE_VERSION=$(python -c "import json; print(json.load(open('versions.json', encoding='utf-8'))['suite']['version'])")
          TAG_PREFIX=$(python -c "import json; data=json.load(open('versions.json', encoding='utf-8')); print(data.get('release', {}).get('tagPrefix', 'v'))")
          TAG_NAME="${TAG_PREFIX}${SUITE_VERSION}"

          echo "suite_version=$SUITE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Check whether tag already exists
        id: tag_check
        shell: bash
        run: |
          TAG_NAME="${{ steps.manifest.outputs.tag_name }}"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG_NAME already exists. Nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG_NAME does not exist yet."
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          TAG_NAME="${{ steps.manifest.outputs.tag_name }}"
          SUITE_VERSION="${{ steps.manifest.outputs.suite_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

          echo "Created tag $TAG_NAME for suite version $SUITE_VERSION."
